<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Calculator!</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <div class="container">
            <div id="display" class="display">

            </div>
            <div class="buttons">
                <button class="delete" id="del">DEL</button>
                <button class="ac" id="ac">AC</button>
                <button class="mod" id="mod">%</button>
                <button class="divide" id="divide">/</button>

                <button>7</button>
                <button>8</button>
                <button>9</button>
                <button class="multiply" value="*" id="multiply">×</button>

                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button class="subtract" value="-" id="subtract">-</button>

                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button class="addition" value="+" id="addition">+</button>

                <button>+/-</button>
                <button>0</button>
                <button>.</button>
                <button class="equal" id="equal">=</button>
            </div>


        </div>



        <script src="script.js"></script>
    </body>

</html>
